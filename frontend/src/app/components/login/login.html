<div class="auth-wrapper">
  <div class="auth-container split">
    <!-- Image Side -->
    <div class="auth-image">
      <div class="overlay"></div>
      <div class="image-content">
        <h2>Un nuevo comienzo te espera.</h2>
        <p>Inicia sesión para gestionar tus planes de viaje y servicios personalizados.</p>
      </div>
    </div>

    <!-- Form Side -->
    <div class="auth-form-side">
      <div class="form-header">
        <div class="logo-mark" style="margin: 0 auto 15px;">
          <!-- Exact Replica SVG: Original Colors (Black, Steel Blue, White) -->
          <svg width="45" height="45" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="48" fill="#000000"/>
            <circle cx="50" cy="50" r="32" fill="#4a6fa5"/>
            <path d="M18 50 C18 60, 82 60, 82 50 C82 40, 18 40, 18 50" fill="none" stroke="white" stroke-width="2" transform="rotate(-15, 50, 50)"/>
            <g transform="translate(68, 38) rotate(30)">
              <path d="M0 0 L15 5 L0 10 L3 5 Z" fill="white"/>
              <path d="M5 5 L-5 2 L-3 5 L-5 8 Z" fill="white"/>
            </g>
          </svg>
        </div>
        <h1>Bienvenido</h1>
        <p>Por favor, introduce tus datos para entrar</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            <input type="email" name="email" [(ngModel)]="credentials.email" placeholder="example@mail.com" required>
          </div>
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <div class="input-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <input type="password" name="password" [(ngModel)]="credentials.password" placeholder="Tu contraseña" required>
          </div>
        </div>

        <div class="error-msg" *ngIf="error">
          {{ error }}
        </div>

        <button type="submit" class="btn-auth">Entrar</button>

        <p class="switch-auth">
          ¿No tienes cuenta? <a routerLink="/register">Regístrate gratis</a>
        </p>
      </form>
    </div>
  </div>
</div>
