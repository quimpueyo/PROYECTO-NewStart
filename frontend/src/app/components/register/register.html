<div class="register-container">
  <div class="register-card">
    <div class="logo">
      <h1>NEW START</h1>
      <p>Crea tu cuenta gratuita</p>
    </div>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <div class="form-row">
        <div class="form-group">
          <label for="name">Nombre</label>
          <input type="text" id="name" name="name" [(ngModel)]="userData.name" required placeholder="Nombre">
        </div>
        <div class="form-group">
          <label for="lastname">Apellidos</label>
          <input type="text" id="lastname" name="lastname" [(ngModel)]="userData.lastname" required placeholder="Apellidos">
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" [(ngModel)]="userData.email" required placeholder="tu@email.com">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" [(ngModel)]="userData.password" required minlength="6" placeholder="Mín. 6 caracteres">
      </div>

      <div class="form-group">
        <label for="destination">País de destino (Opcional)</label>
        <input type="text" id="destination" name="destination" [(ngModel)]="userData.destination_country" placeholder="¿A dónde vas?">
      </div>

      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>

      <button type="submit" class="btn-register" [disabled]="!registerForm.form.valid">
        Registrarse
      </button>
    </form>

    <div class="footer">
      <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
    </div>
  </div>
</div>
